static_cloud_self_filter:
  input_cloud_topic: /lio_sam/mapping/map_local
  visual_objects_topic: /warning/selected_visual_object_states
  output_topic: /warning/static_cloud_filtered
  object_stale_timeout_sec: 0.5
  history_duration_sec: 3.0
  radius_margin_m: 0.35
  min_object_confidence: 0.35
  min_object_points: 25
  min_object_radius_m: 0.05
  # 地面排除阈值：map系下 z 低于此值的点会被视为地面点而忽略。
  # 当前 tower_crane_section_raw.bag 地面约 -7.0m；设为 -inf 表示不过滤。
  ground_z_threshold: 20