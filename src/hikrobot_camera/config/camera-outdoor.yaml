# true 1 和 false 0 
width: 1440             #图像宽度
height: 1080            #图像高度
Offset_x: 0             #X方向偏置
Offset_y: 0             #Y方向偏置

FrameRateEnable: true   #使能 
FrameRate: 10           #帧率

ExposureTime: 1000     #曝光时间，户外白天建议从 1500~3000 起调

# 白平衡
BalanceWhiteAuto: 2    # 0:手动 1:一次 2:连续(若设备支持)
BalanceWhiteAuto: 2    # 0:手动 1:一次 2:连续(若设备支持)

GammaEnable: false
Gamma: 1.0              #伽马因子，关闭时不生效

GainAuto: 2             #自动增益模式

SaturationEnable: false
Saturation: 128          #饱和度

# 话题发布开关
publish_rgb: false
# ===== rosbag-friendly compressed image output =====
# Enable publishing /hikrobot_camera/rgb/compressed (sensor_msgs/CompressedImage)
publish_rgb_compressed: true

# Compressor settings (jpeg/png)
compressed_format: jpeg        # jpeg | png
compressed_jpeg_quality: 85    # 0-100, higher = better quality & larger bag
compressed_png_level: 3        # 0-9, higher = smaller & slower

# Optional throttling for rosbag bandwidth (0.0 = no limit)
compressed_max_fps: 0.0

# Topics (usually no need to change)
compressed_input_topic: /hikrobot_camera/rgb
compressed_output_topic: /hikrobot_camera/rgb/compressed
